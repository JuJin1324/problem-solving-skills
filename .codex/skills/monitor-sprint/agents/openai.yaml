interface:
  display_name: "Monitor Sprint"
  short_description: "스프린트 status 문서를 자동 생성·갱신하고 진행률/리스크/다음 스킬을 대시보드로 요약"
  default_prompt: "Use $monitor-sprint to parse the latest loop sprint status document (silently bootstrap it from 02-design-phase.md if missing). Always return only: (1) Sprint Dashboard with a 10-cell progress bar, (2) US Board table with status/schedule/next skill/next action, (3) Risk Radar, and (4) Skill Routing recommendations across /design-implementation, /execute-implementation, /design-test, /execute-test, and retrospective transition. Do not mention file existence/creation/update metadata unless the user explicitly asks or there is an unrecoverable error."
